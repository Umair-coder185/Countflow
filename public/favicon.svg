<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Primary gradient for background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369A1;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#0284C7;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#0891B2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial gradient for glow effect -->
    <radialGradient id="glowGrad">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
    
    <!-- Bright white gradient for elements -->
    <linearGradient id="elemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F2FE;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Outer glow layer -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="256" fill="url(#glowGrad)"/>
  
  <!-- Inner premium circles -->
  <circle cx="256" cy="256" r="235" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  
  <!-- Main design: stylized flowing C -->
  <g transform="translate(256, 256)">
    <!-- Large bold C shape with gradient -->
    <path d="M -100 -85 A 125 125 0 0 1 -100 85" 
          fill="none" 
          stroke="url(#elemGrad)" 
          stroke-width="32" 
          stroke-linecap="round"
          opacity="1"
          filter="drop-shadow(0 4px 8px rgba(0,0,0,0.2))"/>
    
    <!-- Flowing line 1 (top) - dynamic curve -->
    <path d="M -20 -78 Q 25 -60 65 -78" 
          fill="none" 
          stroke="url(#elemGrad)" 
          stroke-width="14" 
          stroke-linecap="round"
          opacity="0.98"
          filter="drop-shadow(0 2px 4px rgba(0,0,0,0.15))"/>
    
    <!-- Flowing line 2 (middle-upper) -->
    <path d="M -10 -30 Q 30 -15 70 -30" 
          fill="none" 
          stroke="white" 
          stroke-width="13" 
          stroke-linecap="round"
          opacity="0.95"/>
    
    <!-- Flowing line 3 (middle-lower) -->
    <path d="M -10 30 Q 30 15 70 30" 
          fill="none" 
          stroke="white" 
          stroke-width="13" 
          stroke-linecap="round"
          opacity="0.95"/>
    
    <!-- Flowing line 4 (bottom) - dynamic curve -->
    <path d="M -20 78 Q 25 60 65 78" 
          fill="none" 
          stroke="url(#elemGrad)" 
          stroke-width="14" 
          stroke-linecap="round"
          opacity="0.98"
          filter="drop-shadow(0 2px 4px rgba(0,0,0,0.15))"/>
    
    <!-- Large accent dots - representing data flow -->
    <circle cx="105" cy="-85" r="12" fill="url(#accentGrad)" opacity="0.9" filter="drop-shadow(0 4px 8px rgba(255,107,107,0.4))"/>
    <circle cx="110" cy="0" r="12" fill="url(#accentGrad)" opacity="0.9" filter="drop-shadow(0 4px 8px rgba(255,107,107,0.4))"/>
    <circle cx="105" cy="85" r="12" fill="url(#accentGrad)" opacity="0.9" filter="drop-shadow(0 4px 8px rgba(255,107,107,0.4))"/>
    
    <!-- Small premium accent dots -->
    <circle cx="88" cy="-55" r="5" fill="white" opacity="0.9"/>
    <circle cx="92" cy="0" r="5" fill="white" opacity="0.9"/>
    <circle cx="88" cy="55" r="5" fill="white" opacity="0.9"/>
    
    <!-- Corner shine effect -->
    <ellipse cx="120" cy="-100" rx="25" ry="20" fill="white" opacity="0.15"/>
  </g>
</svg>
